services:

  ocelot-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-gateway
    ports:
      - "5000:8080"
    volumes:
      - ./src/Gateway/ocelot.json:/app/ocelot.json:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - identity-service
      - file-service
      - course-service
      - quiz-service
      - notification-service
    restart: always
    networks:
      - eduspace-net

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-identity
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=identity-db;Port=5432;Database=IdentityService;Username=postgres;Password=postgres
      - Redis__ConnectionString=redis:6379
    depends_on:
      - identity-db
      - redis
    restart: always
    networks:
      - eduspace-net

  identity-db:
    image: postgres:16
    environment:
      POSTGRES_DB: IdentityService
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    restart: always
    networks:
      - eduspace-net

  course-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-course
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=course-db;Port=5432;Database=CourseDB;Username=postgres;Password=postgres
      - Redis__ConnectionString=redis:6379
    depends_on:
      - course-db
      - redis
    env_file:
      - .env
    restart: always
    networks:
      - eduspace-net

  course-db:
    image: postgres:16
    environment:
      POSTGRES_DB: CourseDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - course-db-data:/var/lib/postgresql/data
    restart: always
    networks:
      - eduspace-net

  quiz-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-quiz
    ports:
      - "5006:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=quiz-db;Port=5432;Database=quizdb;Username=postgres;Password=123
      - Redis__ConnectionString=redis:6379
    depends_on:
      - quiz-db
      - redis
    restart: always
    networks:
      - eduspace-net

  quiz-db:
    image: postgres:16
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    volumes:
      - quiz-db-data:/var/lib/postgresql/data
    restart: always
    networks:
      - eduspace-net

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-notification
    ports:
      - "5007:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
    networks:
      - eduspace-net

  file-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: final-file
    ports:
      - "5005:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=file-db;Port=5432;Database=FileDB;Username=postgres;Password=postgres
    env_file:
      - .env
    depends_on:
      - file-db
    restart: always
    networks:
      - eduspace-net

  file-db:
    image: postgres:16
    environment:
      POSTGRES_DB: FileDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - file-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always
    networks:
      - eduspace-net
      

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - eduspace-net

networks:
  eduspace-net:
    driver: bridge

volumes:
  identity-db-data:
  course-db-data:
  file-db-data:
    driver: local
  quiz-db-data:
  redis-data:
  
