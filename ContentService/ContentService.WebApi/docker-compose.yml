version: '3.8'
services:
  db:
    image: postgres:15
    container_name: contentservice_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentservicedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - contentservice-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: contentservice_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - contentservice-net

  webapi:
    build:
      context: ..
      dockerfile: ContentService.WebApi/Dockerfile
    container_name: contentservice_webapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - contentservice-net

volumes:
  pgdata:

networks:
  contentservice-net:
    driver: bridge

