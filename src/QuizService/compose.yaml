services:
  quizservice.webapi:
    image: quizservice.webapi
    build:
      context: .
      dockerfile: QuizService.WebApi/Dockerfile
    ports:
      - "5006:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=quizdb;Username=postgres;Password=123
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5436:5432"
    volumes:
      - quiz-db-data:/var/lib/postgresql/data

volumes:
  quiz-db-data:
      external: true
