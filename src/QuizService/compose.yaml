services:
  quizservice.webapi:
    image: quizservice.webapi
    build:
      context: .
      dockerfile: QuizService.WebApi/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5436;Database=quizdb;Username=postgres;Password=postgres
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=quizdb
    ports:
      - "5436:5432"
    volumes:
      - quiz-db-data:/var/lib/postgresql/data

volumes:
  quiz-db-data:
    external: true