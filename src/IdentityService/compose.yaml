# yaml
services:
  identity.server:
    image: ${DOCKER_REGISTRY-}identityservice
    build:
      context: .
      dockerfile: IdentityService.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=IdentityService;Username=postgres;Password=postgres
    ports:
      - "5010:8080"
      - "5011:8081"
    depends_on:
        - postgres
    env_file:
      - ../../.env
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: IdentityService
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
    driver: local
