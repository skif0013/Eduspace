services:
  user.server:
    image: ${DOCKER_REGISTRY-}usersevice
    build:
      context: .
      dockerfile: UserService.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=UserDB;Username=postgres;Password=postgres
    
    ports:
      - "5003:8080"
    depends_on:
      - postgres
    env_file:
      - ../../.env
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: UserDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  user-db-data:
    external: true