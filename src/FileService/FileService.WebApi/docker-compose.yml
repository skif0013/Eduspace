services:
  file.server:
    image: ${DOCKER_REGISTRY-}fileservice
    build:
      context: ../../..
      dockerfile: src/FileService/FileService.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=fileservice;Username=postgres;Password=123
        
    ports:
      - "5010:5010"
      - "5011:5011"
    depends_on:
      - postgres
    env_file:
        - ../../../.env
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fileservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
    driver: local
