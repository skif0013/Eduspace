services:
  file.server:
    image: ${DOCKER_REGISTRY-}fileservice
    build:
      context: ../../..
      dockerfile: src/FileService/FileService.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=fileservice;Username=postgres;Password=123
        
    ports:
      - "5005:8080"
    depends_on:
      - postgres
    env_file:
        - ../../../../.env
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: FileDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - file-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  file-db-data:
    external: true
