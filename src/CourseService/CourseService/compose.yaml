services:
  courseservice.api:
    image: ${DOCKER_REGISTRY-}courseservice
    build:
      context: .
      dockerfile: CourseService.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=CourseDB;Username=postgres;Password=postgres
    ports:
      - "5016:5016"
      - "5017:5017"
    depends_on:
      - postgres
    env_file:
      - .env
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: CourseDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  
  seq:
    image: datalust/seq:latest
    volumes:
      - seq_data:/data
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=YourStrongPassword123!
    ports:
      - 5341:80

volumes:
  postgres_data:
    driver: local
  seq_data:
    driver: local  