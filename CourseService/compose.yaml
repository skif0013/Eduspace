services:
  courseservice.api:
    image: ${DOCKER_REGISTRY-}courseservice
    build:
      context: .
      dockerfile: CourseService.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionString__DefaultConnection: Host=postgres;Port=5432;Database=CourseDB;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
    ports:
      - "5016:5016"
      - "5017:5017"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: CourseDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
    driver: local